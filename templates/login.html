<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Downloader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: system-ui, sans-serif;
      color: #e0e0e0;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 1.5rem; color: #fff; }
    input[type="password"] {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
    }
    input[type="password"]:focus { border-color: #6c47ff; }
    button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.75rem;
      background: #6c47ff;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #5a38d9; }
    .error {
      margin-top: 1rem;
      color: #f87171;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Enter password</h1>
    <form method="post">
      <input type="password" name="password" placeholder="Password" autofocus required />
      <button type="submit">Unlock</button>
    </form>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
  </div>
</body>
</html>
